<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 150" width="440" height="150" role="img" aria-label="Quil">
  <title>Quil</title>
  <defs>
    <linearGradient id="wmStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#B33500"/>
      <stop offset="35%"  stop-color="#E85D0E"/>
      <stop offset="70%"  stop-color="#FF8A1F"/>
      <stop offset="100%" stop-color="#FFD580"/>
    </linearGradient>
    <linearGradient id="wmText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFE3B5"/>
      <stop offset="50%"  stop-color="#FF9A2A"/>
      <stop offset="100%" stop-color="#B33500"/>
    </linearGradient>
    <linearGradient id="wmBarb" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#E85D0E" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFD580" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Icon mark, shifted inwards with padding -->
  <g transform="translate(5, 5)">
    <path
      d="M 60 21
         A 34 34 0 1 0 84 79
         C 92 89 102 102 112 122"
      fill="none"
      stroke="url(#wmStroke)"
      stroke-width="9"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <path
      d="M 102 108 L 93 102"
      fill="none"
      stroke="url(#wmBarb)"
      stroke-width="5"
      stroke-linecap="round"
    />
  </g>

  <!--
    Wordmark "quil" in JetBrains Mono to reinforce the terminal
    aesthetic. Gradient fades from pale ember at the top to deep
    coal-red at the bottom, evoking a flame rising.
  -->
  <text
    x="155" y="108"
    font-family="'JetBrains Mono', 'SF Mono', ui-monospace, monospace"
    font-size="92"
    font-weight="700"
    letter-spacing="-4"
    fill="url(#wmText)"
  >quil</text>
</svg>
