# Claude Code — AI coding assistant
# Edit this file to customize the plugin. Delete it to restore defaults.

[plugin]
name = "claude-code"
display_name = "Claude Code"
category = "ai"
description = "AI coding assistant"
schema_version = 4

[command]
cmd = "claude"
# path = "/path/to/claude"  # uncomment to override PATH lookup
detect = "claude --version"
prompts_cwd = true  # ask user which folder to open Claude in (preserves .claude/ project context)

# Runtime toggles — rendered in the pane setup dialog.
#
# The two permission-mode toggles below share group = "permission_mode",
# which makes them mutually exclusive: the setup dialog renders them as
# radio buttons, and enabling one automatically disables the other. Both
# default to false, so the user can also pick neither (Claude's standard
# interactive confirmations).
[[command.toggles]]
name = "dangerously_skip_permissions"
label = "Dangerously skip permissions (unattended mode — no confirmations)"
args_when_on = ["--dangerously-skip-permissions"]
default = false
group = "permission_mode"

[[command.toggles]]
name = "enable_auto_mode"
label = "Enable auto mode (safer alternative to skipping permissions)"
args_when_on = ["--enable-auto-mode"]
default = false
group = "permission_mode"

[persistence]
strategy = "preassign_id"
ghost_buffer = false
# Pre-assign a UUID to the new session so Quil can identify the pane.
start_args = ["--session-id", "{session_id}"]
# On restore, the daemon picks one of two templates per pane:
#
#   • If the pre-assigned session file exists on disk
#     (~/.claude/projects/<escaped-cwd>/<session_id>.jsonl), the daemon
#     promotes the resume args to ["--resume", "{session_id}"] so each
#     pane reattaches to its OWN session. This is what multi-pane users
#     actually want — without it, N panes sharing a CWD all converge on
#     claude's "most recent" session.
#
#   • If the file is missing (the pane was closed during claude's startup
#     screens — trust / model picker / mode select — before any exchange
#     could persist the session), the daemon uses the args below as a
#     fallback. --continue then uses claude's own "most recent in cwd"
#     lookup, which is robust to the timing of session-file creation.
#
# The fallback lives here in TOML; the --resume promotion lives in the
# daemon because the filesystem probe is claude-specific (see
# resumeTemplateFor in internal/daemon/daemon.go).
resume_args = ["--continue"]

[[error_handlers]]
pattern = '(?i)error.*API key not found|ANTHROPIC_API_KEY.*not set'
title = "API Key Missing"
message = "Set ANTHROPIC_API_KEY in your environment or run 'claude auth'."
action = "dialog"

# Idle handlers — checked when pane goes idle (last 5 lines analyzed)
[[idle_handlers]]
pattern = '(?i)waiting for (confirmation|input|approval|permission)'
title = "Needs your approval"
severity = "warning"

[[idle_handlers]]
pattern = '(?i)(plan|question|choose|select|pick)'
title = "Waiting for your choice"
severity = "warning"

[[idle_handlers]]
pattern = '❯|> $'
title = "Waiting for input"
severity = "info"
