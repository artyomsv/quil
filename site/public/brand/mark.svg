<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 140" width="130" height="140" role="img" aria-label="Quil logo mark">
  <title>Quil</title>
  <desc>A Q letterform — circle opening at the bottom-right — continuing into a downward curving ember tail, rendered as a single gradient stroke from deep red-orange to pale flame.</desc>

  <defs>
    <linearGradient id="quilStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#B33500"/>
      <stop offset="35%"  stop-color="#E85D0E"/>
      <stop offset="70%"  stop-color="#FF8A1F"/>
      <stop offset="100%" stop-color="#FFD580"/>
    </linearGradient>
    <linearGradient id="quilBarb" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#E85D0E" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFD580" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!--
    Single continuous stroke:
      1. Start at (60, 21) — top of a circle centered at (60, 55), r=34
      2. Counter-clockwise long arc to 4:30 position (84, 79)
      3. Flow out into a downward-right ember tail via cubic bezier

    Same path as the original feather design — only the colours
    changed. The curve now reads as a forge-spark / ember trail
    instead of a quill feather, matching the fire palette.
  -->
  <path
    d="M 60 21
       A 34 34 0 1 0 84 79
       C 92 89 102 102 112 122"
    fill="none"
    stroke="url(#quilStroke)"
    stroke-width="9"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!--
    Short diagonal spark — the counterpart to the original feather
    barb. At a smaller scale this reads as a stray ember falling off
    the main trail.
  -->
  <path
    d="M 102 108 L 93 102"
    fill="none"
    stroke="url(#quilBarb)"
    stroke-width="5"
    stroke-linecap="round"
  />
</svg>
