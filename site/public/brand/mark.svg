<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 140" width="130" height="140" role="img" aria-label="Quil logo mark">
  <title>Quil</title>
  <desc>A Q letterform — circle opening at the bottom-right — continuing into a downward curving feather quill tail, rendered as a single gradient stroke from deep emerald to soft mint.</desc>

  <defs>
    <linearGradient id="quilStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#0D6B42"/>
      <stop offset="55%" stop-color="#1F9968"/>
      <stop offset="100%" stop-color="#A8E6CE"/>
    </linearGradient>
    <linearGradient id="quilBarb" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1F9968" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#A8E6CE" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!--
    Single continuous stroke:
      1. Start at (60, 21) — top of a circle centered at (60, 55), radius 34
      2. Arc counter-clockwise (sweep=0) the LONG way (large=1) through
         9 o'clock → 6 o'clock → ending at 4:30 position (84, 79),
         which is exactly on the circle: cos(45°)*34 = 24, so
         center (60, 55) + (24, 24) = (84, 79).
      3. Flow out into a downward-right feather tail via a cubic bezier.

    One path = one gesture. Reinforces the "breath and continuity"
    aesthetic of the Analogous Calm palette.
  -->
  <path
    d="M 60 21
       A 34 34 0 1 0 84 79
       C 92 89 102 102 112 122"
    fill="none"
    stroke="url(#quilStroke)"
    stroke-width="9"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!--
    Small feather barb — a short diagonal mark suggesting the
    side-fibres of an actual feather. Lower opacity via its own
    gradient so it recedes behind the main stroke but still
    reads as a quill rather than a generic hook.
  -->
  <path
    d="M 102 108 L 93 102"
    fill="none"
    stroke="url(#quilBarb)"
    stroke-width="5"
    stroke-linecap="round"
  />
</svg>
