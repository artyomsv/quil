name: Deploy site (quil.cc)

# Builds the Astro project at site/ and deploys to GitHub Pages.
#
# Triggers:
#   - push to master when site/** changes (the common case)
#   - push to master when this workflow file itself changes
#   - workflow_dispatch (manual rebuild from the Actions tab)
#
# Pages source must be set to "GitHub Actions" in repo settings:
#   Settings → Pages → Source → GitHub Actions.
# The first run will fail until that is flipped. After that, it just
# works on every push.
#
# Custom domain: site/public/CNAME contains "quil.cc" which gets
# copied to dist/CNAME at build time. GitHub Pages reads it on deploy.
# DNS records must be set at the registrar:
#   A    @   185.199.108.153
#   A    @   185.199.109.153
#   A    @   185.199.110.153
#   A    @   185.199.111.153
#   CNAME www artyomsv.github.io
# TLS is provisioned automatically by GitHub Pages via Let's Encrypt.

on:
  push:
    branches: [master]
    paths:
      - "site/**"
      - ".github/workflows/site.yml"
  workflow_dispatch:

# Pages requires only one in-flight deploy per environment. Cancel a
# previous run if a new push comes in while it's still building.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build with Astro
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build site
        run: npm run build
        env:
          NODE_ENV: production

      - name: Confirm SEO assets are in dist/
        run: |
          test -f dist/index.html || (echo "missing dist/index.html" && exit 1)
          test -f dist/sitemap-index.xml || (echo "missing dist/sitemap-index.xml" && exit 1)
          test -f dist/robots.txt || (echo "missing dist/robots.txt" && exit 1)
          test -f dist/CNAME || (echo "missing dist/CNAME" && exit 1)
          grep -q "quil.cc" dist/CNAME || (echo "CNAME does not contain quil.cc" && exit 1)
          grep -q "<title>" dist/index.html || (echo "no <title> in dist/index.html" && exit 1)
          grep -q 'application/ld+json' dist/index.html || (echo "no JSON-LD in dist/index.html" && exit 1)
          grep -q 'rel="canonical"' dist/index.html || (echo "no canonical link in dist/index.html" && exit 1)
          grep -q 'og:title' dist/index.html || (echo "no Open Graph tags in dist/index.html" && exit 1)
          # Verify we have all 11 HTML pages
          test -f dist/404.html || (echo "missing dist/404.html" && exit 1)
          test -f dist/install/index.html || (echo "missing install" && exit 1)
          test -f dist/features/index.html || (echo "missing features" && exit 1)
          test -f dist/plugins/index.html || (echo "missing plugins" && exit 1)
          test -f dist/docs/index.html || (echo "missing docs" && exit 1)
          test -f dist/legal/index.html || (echo "missing legal" && exit 1)
          test -f dist/vs/tmux/index.html || (echo "missing vs/tmux" && exit 1)
          test -f dist/vs/zellij/index.html || (echo "missing vs/zellij" && exit 1)
          test -f dist/vs/wezterm/index.html || (echo "missing vs/wezterm" && exit 1)
          test -f dist/vs/screen/index.html || (echo "missing vs/screen" && exit 1)
          echo "all SEO assets present"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
