name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — compute version but skip commit, tag, and release'
        type: boolean
        default: true

env:
  DRY_RUN: ${{ inputs.dry_run || false }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # commit + tag version bump
    # Skip release commits to prevent infinite loop
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"
    outputs:
      version: ${{ steps.bump.outputs.version }}
      skip: ${{ steps.bump.outputs.skip }}
      dry_run: ${{ env.DRY_RUN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version: '1.25'

      - name: Determine version bump
        id: bump
        run: |
          CURRENT=$(cat VERSION)
          LAST_TAG="v${CURRENT}"
          echo "current=${CURRENT}" >> $GITHUB_OUTPUT

          # Check if tag exists; if not, use all history
          if git rev-parse "$LAST_TAG" >/dev/null 2>&1; then
            COMMITS=$(git log "${LAST_TAG}..HEAD" --oneline)
          else
            COMMITS=$(git log --oneline)
          fi

          echo "--- Commits since ${LAST_TAG} ---"
          echo "$COMMITS"
          echo "---"

          if [ -z "$COMMITS" ]; then
            echo "::notice::No commits since last tag — skipping release"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Determine bump type from conventional commits
          if echo "$COMMITS" | grep -qE '(feat!|fix!|refactor!|BREAKING CHANGE)'; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE 'feat(\(|:)'; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qE '(fix|perf)(\(|:)'; then
            BUMP="patch"
          else
            echo "::notice::No version-bumping commits found (only chore/docs/test/ci) — skipping release"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Calculate new version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case $BUMP in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"

          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "bump=${BUMP}" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "::notice::Version bump: ${CURRENT} → ${NEW_VERSION} (${BUMP})"

      - name: Update version files
        if: steps.bump.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          echo "$VERSION" > VERSION

          # Update CHANGELOG: insert versioned header after [Unreleased]
          DATE=$(date +%Y-%m-%d)
          sed -i "s/## \[Unreleased\]/## [Unreleased]\n\n## [${VERSION}] - ${DATE}/" CHANGELOG.md

          # Bump the marketing site's version pill so quil.cc reflects the
          # release. seo.ts is the single source of truth for the home page
          # hero pill — without this update the site keeps showing the old
          # version even though the binary moved on. Note: the GITHUB_TOKEN
          # push does NOT trigger site.yml (GitHub Actions limitation), so
          # the site is rebuilt by the deploy-site job below.
          sed -i -E "s/(version: )\"[0-9]+\\.[0-9]+\\.[0-9]+\"/\\1\"${VERSION}\"/" site/src/data/seo.ts
          sed -i -E "s/(releaseDate: )\"[0-9]{4}-[0-9]{2}-[0-9]{2}\"/\\1\"${DATE}\"/" site/src/data/seo.ts

          echo "::notice::Updated VERSION to ${VERSION}, CHANGELOG.md, and site/src/data/seo.ts"

      - name: Run tests
        if: steps.bump.outputs.skip != 'true'
        run: |
          go vet ./...
          go test ./...

      - name: Dry run summary
        if: steps.bump.outputs.skip != 'true' && env.DRY_RUN == 'true'
        env:
          VERSION: ${{ steps.bump.outputs.version }}
          BUMP: ${{ steps.bump.outputs.bump }}
        run: |
          echo "::warning::DRY RUN — skipping commit, tag, and release"
          echo "Would have released: v${VERSION}"
          echo "Bump type: ${BUMP}"

      - name: Commit version bump and tag
        if: steps.bump.outputs.skip != 'true' && env.DRY_RUN != 'true'
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION CHANGELOG.md site/src/data/seo.ts
          git commit -m "chore(release): v${VERSION}"
          git tag "v${VERSION}"
          git push origin master --tags
          echo "::notice::Tagged v${VERSION}"

  goreleaser:
    needs: release
    if: needs.release.outputs.skip != 'true' && needs.release.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write  # publish GitHub release assets
    steps:
      - name: Validate version
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$' || {
            echo "::error::Invalid or empty version: '$VERSION'"
            exit 1
          }

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: v${{ needs.release.outputs.version }}
          fetch-depth: 0  # GoReleaser needs full history for tag resolution

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version: '1.25'

      - name: Extract release notes from CHANGELOG.md
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          # IMPORTANT: write the file inside GITHUB_WORKSPACE, not /tmp.
          # `hashFiles()` (used in `if:` conditions on later steps) only
          # matches files inside GITHUB_WORKSPACE, so a /tmp path always
          # hashes to empty string and any guarded step gets skipped.
          # See: https://docs.github.com/en/actions/learn-github-actions/expressions#hashfiles
          sed -n "/^## \[${VERSION}\]/,/^## \[/{ /^## \[${VERSION}\]/d; /^## \[/d; p; }" CHANGELOG.md \
            | tr -d '\r' > release-notes.md
          echo "::notice::Release notes for v${VERSION} ($(wc -c < release-notes.md) bytes):"
          cat release-notes.md

      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a  # v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set release notes
        # No `if: hashFiles(...)` guard here. Earlier versions used
        # `hashFiles('/tmp/release-notes.md') != ''` which always evaluated
        # false because /tmp is outside GITHUB_WORKSPACE — the step was
        # silently skipped on every release. The inner `[ -s ... ]` check
        # is the real safety net.
        env:
          VERSION: ${{ needs.release.outputs.version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -s release-notes.md ]; then
            gh release edit "v${VERSION}" --notes-file release-notes.md
            echo "::notice::Release notes applied to v${VERSION}"
          else
            echo "::warning::Release notes file is empty — skipping"
          fi

  # --- Site rebuild ---------------------------------------------------
  # Pushes made with GITHUB_TOKEN don't trigger other workflows, so
  # site.yml never fires on the release commit. This job rebuilds and
  # deploys the site directly from the tagged commit (which has the
  # updated seo.ts version pill).
  deploy-site:
    needs: release
    if: needs.release.outputs.skip != 'true' && needs.release.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: v${{ needs.release.outputs.version }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build site
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
