name: Feature request
description: Suggest a new capability or improvement.
labels: [enhancement, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Before filing, please
        skim `docs/roadmap.md` to make sure it isn't already planned.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: |
        Describe the underlying need, not the solution you have in
        mind. The more concrete the workflow, the better.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Your proposal
      description: How you think Quil should handle this. Sketches, keybindings, or config snippets are welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else did you try? What's stopping the existing keybindings, plugins, or MCP tools from solving this?
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Which part of Quil does this touch?
      multiple: true
      options:
        - TUI (tabs, panes, layout, notes)
        - daemon / session management
        - PTY / terminal rendering
        - plugin system (pane types)
        - MCP server
        - hooks / notifications
        - persistence / workspace restore
        - shell integration
        - clipboard / paste
        - keybindings
        - docker / build / release
        - documentation
        - other
    validations:
      required: false
