version: 2

before:
  hooks:
    - go mod tidy -diff
    - go vet ./...

builds:
  - id: aethel
    main: ./cmd/aethel
    binary: aethel
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: aetheld
    main: ./cmd/aetheld
    binary: aetheld
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    builds:
      - aethel
      - aetheld
    name_template: "aethel_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  disable: true

release:
  github:
    owner: artyomsv
    name: aethel
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
