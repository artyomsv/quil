<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Quil — The workspace that survives every reboot.">
  <title>Quil — The workspace that survives every reboot.</title>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0D0704"/>
      <stop offset="50%"  stop-color="#050302"/>
      <stop offset="100%" stop-color="#080402"/>
    </linearGradient>

    <radialGradient id="glowEmber" cx="50%" cy="0%" r="60%">
      <stop offset="0%"   stop-color="#E85D0E" stop-opacity="0.38"/>
      <stop offset="50%"  stop-color="#B33500" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#B33500" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowBrand" cx="12%" cy="30%" r="30%">
      <stop offset="0%"   stop-color="#FF8A1F" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#FF8A1F" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="ogStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#B33500"/>
      <stop offset="35%"  stop-color="#E85D0E"/>
      <stop offset="70%"  stop-color="#FF8A1F"/>
      <stop offset="100%" stop-color="#FFD580"/>
    </linearGradient>
    <linearGradient id="ogBarb" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#E85D0E" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFD580" stop-opacity="0.9"/>
    </linearGradient>

    <linearGradient id="ogTitle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFF2D6"/>
      <stop offset="100%" stop-color="#FFB060"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#glowEmber)"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#glowBrand)"/>

  <!-- Very subtle CRT scanlines -->
  <g stroke="#FF8A1F" stroke-width="0.5" stroke-opacity="0.05">
    <line x1="0" y1="40"  x2="1200" y2="40"/>
    <line x1="0" y1="80"  x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="440" x2="1200" y2="440"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="520" x2="1200" y2="520"/>
    <line x1="0" y1="560" x2="1200" y2="560"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
  </g>

  <g transform="translate(90, 90) scale(1.4)">
    <path
      d="M 60 21
         A 34 34 0 1 0 84 79
         C 92 89 102 102 112 122"
      fill="none"
      stroke="url(#ogStroke)"
      stroke-width="9"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <path
      d="M 102 108 L 93 102"
      fill="none"
      stroke="url(#ogBarb)"
      stroke-width="5"
      stroke-linecap="round"
    />
  </g>

  <text
    x="1110" y="130"
    text-anchor="end"
    font-family="'JetBrains Mono', 'SF Mono', ui-monospace, monospace"
    font-size="34"
    font-weight="700"
    letter-spacing="-2"
    fill="#FFD580"
  >quil</text>

  <text
    x="90" y="300"
    font-family="'JetBrains Mono', 'SF Mono', ui-monospace, monospace"
    font-size="22"
    font-weight="700"
    letter-spacing="3"
    fill="#FF8A1F"
  >&gt; PERSISTENT WORKFLOW</text>

  <text
    x="90" y="370"
    font-family="'JetBrains Mono', 'SF Mono', ui-monospace, monospace"
    font-size="84"
    font-weight="700"
    letter-spacing="-3"
    fill="url(#ogTitle)"
  >The workspace that</text>

  <text
    x="90" y="458"
    font-family="'JetBrains Mono', 'SF Mono', ui-monospace, monospace"
    font-size="84"
    font-weight="700"
    letter-spacing="-3"
    fill="url(#ogTitle)"
  >survives every reboot.</text>

  <text
    x="90" y="518"
    font-family="'Inter', 'SF Pro Display', system-ui, sans-serif"
    font-size="28"
    font-weight="500"
    letter-spacing="-0.5"
    fill="#D4A070"
  >A reboot-proof terminal multiplexer for AI-native development.</text>

  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="22" fill="#B37A48">
    <text x="90" y="575">quil.cc</text>
    <text x="1110" y="575" text-anchor="end">v1.0.0  ·  MIT  ·  Linux · macOS · Windows</text>
  </g>

  <rect x="0" y="620" width="1200" height="3" fill="url(#ogStroke)" opacity="0.75"/>
</svg>
