<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 150" width="440" height="150" role="img" aria-label="Quil">
  <title>Quil</title>
  <defs>
    <linearGradient id="wmStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#0D6B42"/>
      <stop offset="55%" stop-color="#1F9968"/>
      <stop offset="100%" stop-color="#A8E6CE"/>
    </linearGradient>
    <linearGradient id="wmText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F0FFF8"/>
      <stop offset="100%" stop-color="#A8E6CE"/>
    </linearGradient>
    <linearGradient id="wmBarb" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1F9968" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#A8E6CE" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!-- Icon mark, shifted inwards with padding -->
  <g transform="translate(5, 5)">
    <path
      d="M 60 21
         A 34 34 0 1 0 84 79
         C 92 89 102 102 112 122"
      fill="none"
      stroke="url(#wmStroke)"
      stroke-width="9"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <path
      d="M 102 108 L 93 102"
      fill="none"
      stroke="url(#wmBarb)"
      stroke-width="5"
      stroke-linecap="round"
    />
  </g>

  <!--
    Wordmark "quil" in a rounded geometric sans. Rendered as <text>
    so librsvg can rasterise it with its available system font
    (Inter is installed in the render image).
  -->
  <text
    x="155" y="108"
    font-family="'Inter', 'SF Pro Display', system-ui, sans-serif"
    font-size="92"
    font-weight="700"
    letter-spacing="-3"
    fill="url(#wmText)"
  >quil</text>
</svg>
