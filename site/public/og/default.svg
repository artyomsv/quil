<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Quil — the persistent workflow orchestrator for AI-native development">
  <title>Quil</title>

  <defs>
    <!-- Deep forest → pitch-emerald background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#051A10"/>
      <stop offset="40%" stop-color="#0A281A"/>
      <stop offset="100%" stop-color="#061510"/>
    </linearGradient>

    <!-- Radial glow at upper-left, behind the mark -->
    <radialGradient id="glowEmerald" cx="30%" cy="35%" r="45%">
      <stop offset="0%" stop-color="#1F9968" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1F9968" stop-opacity="0"/>
    </radialGradient>

    <!-- Radial glow at bottom-right, teal -->
    <radialGradient id="glowTeal" cx="85%" cy="90%" r="40%">
      <stop offset="0%" stop-color="#0E8A8A" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0E8A8A" stop-opacity="0"/>
    </radialGradient>

    <!-- Mark stroke gradient — mirrors mark.svg for consistency -->
    <linearGradient id="ogStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22A478"/>
      <stop offset="55%" stop-color="#45C498"/>
      <stop offset="100%" stop-color="#A8E6CE"/>
    </linearGradient>
    <linearGradient id="ogBarb" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#45C498" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#A8E6CE" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Title gradient — near-white fading to mint -->
    <linearGradient id="ogTitle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F6FFFB"/>
      <stop offset="100%" stop-color="#C8F0DC"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#glowEmerald)"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#glowTeal)"/>

  <!-- Faint grid for depth (sparse, very low opacity) -->
  <g stroke="#1A8552" stroke-width="1" stroke-opacity="0.06">
    <line x1="0"    y1="157.5" x2="1200" y2="157.5"/>
    <line x1="0"    y1="315"   x2="1200" y2="315"/>
    <line x1="0"    y1="472.5" x2="1200" y2="472.5"/>
    <line x1="300"  y1="0"     x2="300"  y2="630"/>
    <line x1="600"  y1="0"     x2="600"  y2="630"/>
    <line x1="900"  y1="0"     x2="900"  y2="630"/>
  </g>

  <!--
    Brand mark at left. Scaled up from the 130-unit base. Same
    single-stroke Q + feather tail gesture as brand/mark.svg.
  -->
  <g transform="translate(100, 170) scale(2.2)">
    <path
      d="M 60 21
         A 34 34 0 1 0 84 79
         C 92 89 102 102 112 122"
      fill="none"
      stroke="url(#ogStroke)"
      stroke-width="9"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <path
      d="M 102 108 L 93 102"
      fill="none"
      stroke="url(#ogBarb)"
      stroke-width="5"
      stroke-linecap="round"
    />
  </g>

  <!-- Divider line between mark and text -->
  <line x1="420" y1="215" x2="420" y2="415"
        stroke="#1F9968" stroke-opacity="0.25" stroke-width="1"/>

  <!-- Wordmark + tagline on the right -->
  <g font-family="'Inter', 'SF Pro Display', system-ui, sans-serif">
    <text
      x="470" y="280"
      font-size="130"
      font-weight="700"
      letter-spacing="-5"
      fill="url(#ogTitle)"
    >quil</text>

    <text
      x="472" y="338"
      font-size="28"
      font-weight="500"
      letter-spacing="-0.5"
      fill="#8CD4B1"
    >The persistent workflow orchestrator</text>

    <text
      x="472" y="376"
      font-size="28"
      font-weight="500"
      letter-spacing="-0.5"
      fill="#8CD4B1"
    >for AI-native development.</text>
  </g>

  <!-- Footer row: URL + version + license -->
  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="22" fill="#6BB89A">
    <text x="110" y="575">quil.cc</text>
    <text x="1090" y="575" text-anchor="end">v1.0.0  ·  MIT  ·  Linux · macOS · Windows</text>
  </g>

  <!-- Thin bottom accent line in deep emerald → mint gradient -->
  <rect x="0" y="620" width="1200" height="2" fill="url(#ogStroke)" opacity="0.6"/>
</svg>
