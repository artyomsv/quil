name: Release

# Single-person repo: cuts the release commit and tag with a direct push to
# master. The `master` ruleset requires PR review for ordinary pushes, but
# you (artyomsv) are listed as a ruleset bypass_actor with bypass_mode
# "always" — that bypass only applies to YOUR identity, not the ephemeral
# `github-actions[bot]` GITHUB_TOKEN. So the checkout below authenticates
# with the `RELEASE_PAT` secret (a fine-grained PAT owned by you) instead of
# the default token — every git push in this job then runs as you, which the
# ruleset lets straight through. No release PR, no second review step.
#
# Without RELEASE_PAT the job falls back to GITHUB_TOKEN and the push WILL be
# rejected by the ruleset once branch protection is enforced — see the warning
# step below.

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — compute version but skip commit, tag, and release'
        type: boolean
        default: true

env:
  DRY_RUN: ${{ inputs.dry_run || false }}

# Serialize releases: if two pushes to master land close together, queue the
# second run rather than let two release jobs race on the tag/commit. Never
# cancel-in-progress — a release must not be interrupted mid tag-and-push.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    # Hard cap so a hung step (e.g. an intermittent test-suite deadlock) auto-
    # fails instead of running for 15+ min until someone cancels it — the exact
    # toil this workflow kept causing.
    timeout-minutes: 15
    permissions:
      contents: write  # commit + tag version bump
    # Skip release commits to prevent infinite loop
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"
    outputs:
      version: ${{ steps.bump.outputs.version }}
      skip: ${{ steps.bump.outputs.skip }}
      dry_run: ${{ env.DRY_RUN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
          # Persisted by actions/checkout as the git credential for every
          # push in this job — see the header note on why this must be a
          # user-owned PAT, not the default bot token.
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

      - name: Warn if RELEASE_PAT is missing
        # secrets can't be used in a step `if:`, so map presence to env and
        # branch inside the script.
        env:
          HAS_PAT: ${{ secrets.RELEASE_PAT != '' }}
        run: |
          if [ "$HAS_PAT" != "true" ]; then
            echo "::warning::RELEASE_PAT secret is not set. The release push will run as github-actions[bot], which is NOT a ruleset bypass actor — 'git push origin master --tags' below will be rejected by the master branch ruleset. Add the RELEASE_PAT secret (see release.yml header)."
          fi

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version: '1.25'

      - name: Determine version bump
        id: bump
        run: |
          CURRENT=$(cat VERSION)
          LAST_TAG="v${CURRENT}"
          echo "current=${CURRENT}" >> $GITHUB_OUTPUT

          # Scan SUBJECTS only for type-bump classification. A previous
          # version of this script also scanned commit bodies ("%s%n%b"),
          # which produced a false-positive minor bump on PR #35 (docs
          # restructure) because the PR description contained the literal
          # string `feat(tui): add Stop daemon action` — a back-tick-wrapped
          # reference to another open PR — that the body regex matched as
          # if it were a real `feat(tui):` commit. The squash subject set
          # by the merger is the authoritative classification; if a
          # contributor's branch-name-derived subject is non-conventional
          # the `[(:/]` regex below still accepts `feat/foo-bar` form.
          #
          # BREAKING CHANGE is read from bodies because per the Conventional
          # Commits spec it lives in the footer, not the subject. The
          # `^BREAKING[ -]CHANGE:` anchor matches the footer form
          # specifically (line-start + colon) so prose references like
          # "this is not a BREAKING CHANGE" do NOT match.
          if git rev-parse "$LAST_TAG" >/dev/null 2>&1; then
            SUBJECTS=$(git log "${LAST_TAG}..HEAD" --format='%s')
            BODIES=$(git log "${LAST_TAG}..HEAD" --format='%b')
          else
            SUBJECTS=$(git log --format='%s')
            BODIES=$(git log --format='%b')
          fi

          echo "--- Subjects since ${LAST_TAG} ---"
          echo "$SUBJECTS"
          echo "---"

          if [ -z "$SUBJECTS" ]; then
            echo "::notice::No commits since last tag — skipping release"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Determine bump type from conventional commits.
          # - `-i` for case-insensitivity: GitHub's squash-merge auto-capitalizes
          #   branch-name-derived subjects (`feat/x` -> `Feat/x`).
          # - `\b` word boundary: prevents `defeated` / `unfeatured` from
          #   accidentally matching `feat`.
          # - `[(:/]`: accepts `feat:`, `feat(scope):`, AND `feat/branch-name`
          #   (the last appears when the squash subject came from the branch).
          if echo "$SUBJECTS" | grep -qiE '\b(feat!|fix!|refactor!)[(:/]?' \
             || echo "$BODIES" | grep -qE '^BREAKING[ -]CHANGE:'; then
            BUMP="major"
          elif echo "$SUBJECTS" | grep -qiE '\bfeat[(:/]'; then
            BUMP="minor"
          elif echo "$SUBJECTS" | grep -qiE '\b(fix|perf)[(:/]'; then
            BUMP="patch"
          else
            echo "::notice::No version-bumping commits found (only chore/docs/test/ci) — skipping release"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Calculate new version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case $BUMP in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"

          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "bump=${BUMP}" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "::notice::Version bump: ${CURRENT} → ${NEW_VERSION} (${BUMP})"

      - name: Update version files
        if: steps.bump.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          echo "$VERSION" > VERSION

          # Update CHANGELOG: insert versioned header after [Unreleased]
          DATE=$(date +%Y-%m-%d)
          sed -i "s/## \[Unreleased\]/## [Unreleased]\n\n## [${VERSION}] - ${DATE}/" CHANGELOG.md

          # Bump the marketing site's version pill so quil.cc reflects the
          # release. seo.ts is the single source of truth for the home page
          # hero pill — without this update the site keeps showing the old
          # version even though the binary moved on. This file is included in
          # the release commit below, so the push that follows triggers
          # site.yml (path-filtered on site/**) with the correct version
          # already baked in — that is the ONLY thing that deploys the site;
          # see the "Commit version bump and tag" step for why there is no
          # separate deploy job here.
          sed -i -E "s/(version: )\"[0-9]+\\.[0-9]+\\.[0-9]+\"/\\1\"${VERSION}\"/" site/src/data/seo.ts
          sed -i -E "s/(releaseDate: )\"[0-9]{4}-[0-9]{2}-[0-9]{2}\"/\\1\"${DATE}\"/" site/src/data/seo.ts

          echo "::notice::Updated VERSION to ${VERSION}, CHANGELOG.md, and site/src/data/seo.ts"

      - name: Run tests
        if: steps.bump.outputs.skip != 'true'
        run: |
          go vet ./...
          # -race + bounded -timeout: a deadlocked test fails fast with a
          # goroutine dump instead of hanging the release job to its timeout.
          go test -race -timeout 300s ./...

      - name: Dry run summary
        if: steps.bump.outputs.skip != 'true' && env.DRY_RUN == 'true'
        env:
          VERSION: ${{ steps.bump.outputs.version }}
          BUMP: ${{ steps.bump.outputs.bump }}
        run: |
          echo "::warning::DRY RUN — skipping commit, tag, and release"
          echo "Would have released: v${VERSION}"
          echo "Bump type: ${BUMP}"

      - name: Commit version bump and tag
        # This push (via RELEASE_PAT, not the loop-prevention-exempt
        # GITHUB_TOKEN) touches site/src/data/seo.ts, so it triggers a fresh
        # site.yml run on its own — from a commit that already has the
        # correct version baked in. That is deliberately the ONLY thing that
        # deploys quil.cc: release.yml used to ALSO rebuild+deploy the site
        # itself in a dedicated job after goreleaser, to force an
        # "authoritative" redeploy over a stale in-flight site.yml build.
        # That guard against a rare ordering race introduced a much more
        # common one — the two deploys landing back-to-back made GitHub
        # Pages' API reject the second attempt outright ("Deployment failed,
        # try again later"), which is what actually happened on the PR that
        # removed this job (see its description for the concrete failure).
        # Exactly one deploy pathway, from a commit that is always correct,
        # beats two deploy pathways arbitrated by a concurrency group.
        if: steps.bump.outputs.skip != 'true' && env.DRY_RUN != 'true'
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION CHANGELOG.md site/src/data/seo.ts
          git commit -m "chore(release): v${VERSION}"
          git tag "v${VERSION}"
          # --atomic: land the release commit and its tag together or not at
          # all. If this push is interrupted (e.g. the job timeout-minutes cap
          # firing, or a network stall), the server applies both refs or
          # neither — never the commit without the tag (or vice versa), which
          # would otherwise leave a half-released state needing manual cleanup.
          # Push the specific tag rather than --tags so only this release's tag
          # is part of the atomic unit.
          git push --atomic origin master "v${VERSION}"
          echo "::notice::Tagged v${VERSION}"

  goreleaser:
    needs: release
    if: needs.release.outputs.skip != 'true' && needs.release.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    # Cross-compiles 5 platforms + publishes assets — give it more room than the
    # release job, but still bounded so a stuck upload can't hang indefinitely.
    timeout-minutes: 30
    permissions:
      contents: write  # publish GitHub release assets
    steps:
      - name: Validate version
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$' || {
            echo "::error::Invalid or empty version: '$VERSION'"
            exit 1
          }

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: v${{ needs.release.outputs.version }}
          fetch-depth: 0  # GoReleaser needs full history for tag resolution

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version: '1.25'

      - name: Extract release notes from CHANGELOG.md
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          # IMPORTANT: write the file inside GITHUB_WORKSPACE, not /tmp.
          # `hashFiles()` (used in `if:` conditions on later steps) only
          # matches files inside GITHUB_WORKSPACE, so a /tmp path always
          # hashes to empty string and any guarded step gets skipped.
          # See: https://docs.github.com/en/actions/learn-github-actions/expressions#hashfiles
          sed -n "/^## \[${VERSION}\]/,/^## \[/{ /^## \[${VERSION}\]/d; /^## \[/d; p; }" CHANGELOG.md \
            | tr -d '\r' > release-notes.md
          echo "::notice::Release notes for v${VERSION} ($(wc -c < release-notes.md) bytes):"
          cat release-notes.md

      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a  # v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set release notes
        # The release body must NEVER be empty. The CHANGELOG section is the
        # preferred source, but when a PR ships without a `## [Unreleased]`
        # entry that section is empty (this produced blank release pages on
        # v1.29.0 and v1.31.0). In that case we fall back to GitHub's
        # commit/PR-generated notes so every release has a description.
        env:
          VERSION: ${{ needs.release.outputs.version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Treat a whitespace-only section as empty: the extract step emits a
          # lone newline (1 byte) for an empty CHANGELOG section, which `[ -s ]`
          # wrongly accepts as non-empty — that bug shipped v1.31.1 with a blank
          # body. Strip whitespace and test for genuinely-empty content.
          if [ -z "$(tr -d '[:space:]' < release-notes.md)" ]; then
            echo "::warning::CHANGELOG section for v${VERSION} is empty — generating notes from commits/PRs"
            gh api --method POST "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
              -f tag_name="v${VERSION}" --jq .body > release-notes.md
          fi
          if [ -z "$(tr -d '[:space:]' < release-notes.md)" ]; then
            echo "::error::Could not produce release notes for v${VERSION}"
            exit 1
          fi
          gh release edit "v${VERSION}" --notes-file release-notes.md
          echo "::notice::Release notes applied to v${VERSION}"

  # --- Site deploy ------------------------------------------------------
  # There is deliberately no site-deploy job here. site.yml (path-filtered on
  # site/**) is the ONLY thing that ever deploys quil.cc, triggered by the
  # "Commit version bump and tag" push above (it touches site/src/data/seo.ts
  # with the version already bumped). site.yml carries its own top-level
  # `concurrency: {group: pages, cancel-in-progress: true}`, so if the
  # original merge push ALSO happened to touch site/** (a docs/site PR bundled
  # with the release-worthy commit), that earlier, stale-content site.yml run
  # is a run of the very same workflow/group and is guaranteed to be
  # cancelled-or-superseded by this strictly-later, correct-content run —
  # no separate job or shared concurrency group needed to arbitrate between
  # two different workflows. See CHANGELOG / git history for why a redundant
  # deploy-site job briefly existed here and why it was removed (it made two
  # independent deploys of the SAME correct content race each other, and
  # GitHub Pages' API rejected the second one outright).
